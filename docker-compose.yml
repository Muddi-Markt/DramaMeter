services:
  app:
    build:
      context: .
      dockerfile: Muddi.DramaMeter.Blazor/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DramaMeter=Host=postgres;Port=5432;Database=drama_meter;Username=drama_meter;Password=drama_meter
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: drama_meter
      POSTGRES_USER: drama_meter
      POSTGRES_PASSWORD: drama_meter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drama_meter -d drama_meter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
